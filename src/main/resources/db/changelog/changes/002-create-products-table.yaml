databaseChangeLog:
  - changeSet:
      id: 1
      author: mykidevs
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: price
                  type: DECIMAL(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    referencedTableName: producers
                    referencedColumnNames: id
                    foreignKeyName: fk_product_producer
                    deleteCascade: true
              - column:
                  name: attributes
                  type: jsonb
                  constraints:
                    nullable: false
        - createSequence:
            sequenceName: product_seq_id
            incrementBy: 10
            startValue: 1
  - changeSet:
      id: 2
      author: mykidevs
      dbms: postgresql
      changes:
        - sql:
            sql: CREATE INDEX idx_product_attributes ON products USING GIN (attributes);